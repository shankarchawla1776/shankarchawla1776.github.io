<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Shankar Chawla</title>
    <style>
        * {
            word-wrap: break-word;
            overflow-wrap: break-word;
            hyphens: auto;
        }

        body {
            font-family: "Computer Modern", "Latin Modern Roman", "Times New Roman", serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            line-height: 1.4;
            background-color: white;
            color: black;
            font-size: 14px;
        }

        h1 {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            border-bottom: 1px solid #000;
            padding-bottom: 8px;
        }

        h2 {
            font-size: 16px;
            font-weight: bold;
            margin-top: 12px;
            margin-bottom: 10px;
        }

        a {
            color: #0000EE;
            text-decoration: underline;
        }

        a:visited {
            color: #551A8B;
        }

        a:hover {
            color: #0000EE;
        }

        .nav {
            text-align: center;
            margin-bottom: 20px;
        }

        .post-list {
            list-style-type: none;
            padding-left: 0;
        }

        .post-item {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #ddd;
        }

        .post-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .post-date {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
        }

        .post-excerpt {
            margin-top: 8px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="nav">
        <a href="index.html">← Back to Home</a>
    </div>

    <h1>Blog</h1>

    <ul class="post-list" id="post-list">
        <!-- Posts will be loaded here by JavaScript -->
    </ul>

    <script>
        // List of all blog posts (add new posts here)
        const posts = [
            // Posts coming soon!
        ];

        // Sort posts by date (newest first)
        posts.sort((a, b) => new Date(b.date) - new Date(a.date));

        // Generate post list
        const postList = document.getElementById('post-list');

        if (posts.length === 0) {
            postList.innerHTML = '<li style="list-style: none; text-align: center; color: #666; font-size: 16px; padding: 40px 0;">coming soon hopefully.</li>';
        } else {
            posts.forEach(post => {
                const li = document.createElement('li');
                li.className = 'post-item';

                const dateFormatted = new Date(post.date).toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });

                li.innerHTML = `
                    <div class="post-title">
                        <a href="post.html?file=${encodeURIComponent(post.file)}">${post.title}</a>
                    </div>
                    <div class="post-date">${dateFormatted}</div>
                    ${post.excerpt ? `<div class="post-excerpt">${post.excerpt}</div>` : ''}
                `;

                postList.appendChild(li);
            });
        }
    </script>
</body>
</html>
